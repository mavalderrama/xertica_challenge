services:
  db:
    image: pgvector/pgvector:pg18-trixie
    environment:
      POSTGRES_DB: compliance_db
      POSTGRES_USER: compliance
      POSTGRES_PASSWORD: compliance
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U compliance -d compliance_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  langfuse:
    image: langfuse/langfuse:2
    environment:
      DATABASE_URL: postgresql://compliance:compliance@db:5432/compliance_db
      NEXTAUTH_SECRET: supersecret-change-in-production
      NEXTAUTH_URL: http://localhost:3000
      SALT: supersalt
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  api:
    build: ./backend
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      POSTGRES_HOST: db
      POSTGRES_DB: compliance_db
      POSTGRES_USER: compliance
      POSTGRES_PASSWORD: compliance
      LANGFUSE_HOST: http://langfuse:3000
      USE_MOCK_BQ: "true"
      USE_MOCK_GCS: "true"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/compliance_agent:/app/compliance_agent
      - ./backend/config:/app/config

volumes:
  pgdata:
