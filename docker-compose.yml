services:
  db:
    image: pgvector/pgvector:pg18-trixie
    environment:
      POSTGRES_DB: compliance_db
      POSTGRES_USER: compliance
      POSTGRES_PASSWORD: compliance
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U compliance -d compliance_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  langfuse:
    image: langfuse/langfuse:2
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse_db:5432/langfuse
      NEXTAUTH_SECRET: supersecret-change-in-production
      NEXTAUTH_URL: http://localhost:3000
      SALT: supersalt
    ports:
      - "3000:3000"
    depends_on:
      langfuse_db:
        condition: service_healthy

  langfuse_db:
    image: postgres:16
    environment:
      POSTGRES_DB: langfuse
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
    volumes:
      - langfuse_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      POSTGRES_HOST: db
      POSTGRES_DB: compliance_db
      POSTGRES_USER: compliance
      POSTGRES_PASSWORD: compliance
      LANGFUSE_HOST: http://langfuse:3000
      USE_MOCK_BQ: "true"
      USE_MOCK_GCS: "true"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./compliance_agent:/app/compliance_agent
      - ./config:/app/config

volumes:
  pgdata:
  langfuse_pgdata:
