name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and push Docker image
        run: |
          IMAGE=us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/compliance/api:${{ github.sha }}
          docker build -t $IMAGE ./backend
          docker push $IMAGE

      - name: Deploy to Cloud Run
        run: |
          IMAGE=us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/compliance/api:${{ github.sha }}
          gcloud run deploy compliance-api \
            --image=$IMAGE \
            --region=us-central1 \
            --platform=managed \
            --no-allow-unauthenticated \
            --set-env-vars="DJANGO_SETTINGS_MODULE=config.settings.production" \
            --set-secrets="POSTGRES_PASSWORD=compliance-db-password:latest,DJANGO_SECRET_KEY=django-secret-key:latest" \
            --min-instances=1 \
            --max-instances=10 \
            --memory=2Gi \
            --cpu=2
